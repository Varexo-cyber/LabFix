[build]
  command = "npm run build"
  publish = ".next"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Redirect Mollie webhook to Netlify Function
[[redirects]]
  from = "/api/payments/mollie/webhook"
  to = "/.netlify/functions/mollie-webhook/mollie-webhook.mjs"
  status = 200
